name: Deploy to DEV (PR Trigger)

on:
  pull_request:
    paths:
      - 'dbt_project/**'
      - 'cortex_code/**'
      - 'configs/**'

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SF_DEV_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SF_DEV_PASSWORD }}
  SNOWFLAKE_ROLE: 'DEV_PIPELINE_ROLE'
  # Dynamic Database Name based on PR Number to ensure isolation
  SNOWFLAKE_DATABASE: SHOPSTREAM_DEV_PR_${{ github.event.pull_request.number }}
  SNOWFLAKE_SCHEMA: DEV_ANALYTICS
  SNOWFLAKE_WAREHOUSE: DEV_TRANSFORM_WH
  DBT_TARGET_ENV: dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r cortex_code/requirements.txt
          pip install dbt-snowflake==1.7.0

      - name: Deploy Snowflake Infrastructure (Python API)
        run: python cortex_code/deploy_infrastructure.py dev

      - name: Run dbt dependencies
        working-directory: ./dbt_project
        run: dbt deps

      - name: Build dbt models (Slim CI)
        working-directory: ./dbt_project
        # Using state:modified+ builds only changed models and their downstream dependencies.
        # It defers unmodified models to the PROD state (Requires downloading manifest.json from PROD in a real setup).
        run: dbt build --target ${{ env.DBT_TARGET_ENV }} --select state:modified+ --defer --state path/to/prod/artifacts || dbt build --target ${{ env.DBT_TARGET_ENV }}

      - name: Validate Deployment with Snowflake Cortex
        run: python cortex_code/validate_deployment.py dev
