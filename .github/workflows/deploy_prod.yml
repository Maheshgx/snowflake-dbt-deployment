name: Deploy to PROD (Release Tag)

on:
  push:
    tags:
      - 'v*.*.*'

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SF_PROD_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SF_PROD_PASSWORD }}
  SNOWFLAKE_ROLE: 'PROD_PIPELINE_ROLE'
  SNOWFLAKE_DATABASE: SHOPSTREAM_PROD
  SNOWFLAKE_SCHEMA: ANALYTICS_PROD
  SNOWFLAKE_WAREHOUSE: PROD_TRANSFORM_WH
  DBT_TARGET_ENV: prod

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r cortex_code/requirements.txt
          pip install dbt-snowflake==1.7.0

      - name: Deploy Snowflake Infrastructure (Python API)
        run: python cortex_code/deploy_infrastructure.py prod

      - name: Run dbt dependencies
        working-directory: ./dbt_project
        run: dbt deps

      - name: Build dbt models
        working-directory: ./dbt_project
        run: dbt build --target ${{ env.DBT_TARGET_ENV }}

      - name: Validate Deployment with Snowflake Cortex
        run: python cortex_code/validate_deployment.py prod
